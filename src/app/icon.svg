<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#1d4ed8"/>

  <!-- Clock face -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="white" stroke-width="1.5"/>

  <!-- Hour ticks -->
  <line x1="16" y1="7.5" x2="16" y2="9" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="23" x2="16" y2="24.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="7.5" y1="16" x2="9" y2="16" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="23" y1="16" x2="24.5" y2="16" stroke="white" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Hour hand (pointing ~8 o'clock for "overtime" feel) -->
  <line x1="16" y1="16" x2="12.5" y2="19.5" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Minute hand (pointing ~12 o'clock) -->
  <line x1="16" y1="16" x2="16" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="white"/>

  <!-- Small "+" indicator top-right for overtime -->
  <circle cx="24" cy="8" r="4.5" fill="#f59e0b"/>
  <line x1="24" y1="5.5" x2="24" y2="10.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21.5" y1="8" x2="26.5" y2="8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
